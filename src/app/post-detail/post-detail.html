<div class="masterclass-view" *ngIf="post">
    <nav class="breadcrumb">
        <a routerLink="/list">← Back to Dashboard</a>
    </nav>

    <div class="main-layout">
        <div class="visual-sidebar">
            <div class="image-wrapper">
                <img [src]="post.imageUrl" alt="Code Architecture Image">
            </div>
            <a [href]="post.instagramPermalink" target="_blank" class="instagram-btn">
                View post on Instagram
            </a>
        </div>

        <div class="content-body">
            <div class="content-header">
                <span class="category-tag">DEEP DIVE</span>
                <h1>{{ post.topic }}</h1>
                <small>Archived Date: {{ post.createdAt | date:'fullDate' }}</small>
            </div>

            <div class="section">
                <h4 class="section-title">Instagram Summary</h4>
                <p class="caption-text">{{ post.instagramCaption }}</p>
            </div>

            <div class="section">
                <h4 class="section-title">Architectural Deep Dive (Vast Information)</h4>
                <pre class="vast-information">{{ post.vastInformation }}</pre>
            </div>
        </div>
    </div>
</div>
